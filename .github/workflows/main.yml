name: Borsa_Alpha_Predator
on:
  schedule:
    - cron: '*/30 07-16 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v3

      - name: Python 3.11 Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Sürümü yükselttik
          cache: 'pip'

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Botu Calistir
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py
