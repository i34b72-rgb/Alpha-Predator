name: Borsa_Alpha_Predator
on:
  schedule:
    - cron: '*/30 07-16 * * 1-5' # Hafta içi, borsa saatlerinde her 30 dk bir
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v3

      - name: Python 3.10 Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Kutuphaneleri Yukle
        run: pip install -r requirements.txt

      - name: Botu Calistir
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py
